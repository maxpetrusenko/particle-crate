<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#f4efe2" />
    <title>Particle Crate</title>
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three/build/three.module.js",
          "three/addons/": "./vendor/three/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <main class="shell">
      <section class="stage" aria-label="3D open crate particle simulation">
        <canvas id="sim" width="1200" height="820"></canvas>
        <div class="hud" aria-live="polite">
          <strong id="bodyCount">0 bodies</strong>
          <span id="particleCount">0 selected</span>
          <span id="gridCount">0 contacts</span>
          <span id="fps">0 fps</span>
          <span id="engineStatus">3D crate</span>
          <span id="stepTime">0.0 ms</span>
        </div>
      </section>
    </main>

    <script type="module" src="src/sim.js"></script>
  </body>
</html>
